name: CI

on:
  push:
    branches: [main, build]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --python ${{ matrix.python-version }}

      - name: Ruff check
        run: uv run --python ${{ matrix.python-version }} ruff check .

      - name: Ruff format check
        run: uv run --python ${{ matrix.python-version }} ruff format --check .

      - name: Mypy
        run: uv run --python ${{ matrix.python-version }} mypy

      - name: Pytest
        run: uv run --python ${{ matrix.python-version }} pytest --cov=raster_batch --cov-report=term-missing
